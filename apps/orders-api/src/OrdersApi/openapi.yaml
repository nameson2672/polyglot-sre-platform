openapi: "3.1.0"
info:
  title: Orders API
  version: "1.0.0"
  description: |
    Owns the Order aggregate. Reads/writes Postgres and publishes domain events
    via a transactional outbox pattern to a Redis Stream.
servers:
  - url: http://localhost:8080
    description: Local development

security: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    OrderItem:
      type: object
      required: [line_no, sku, qty, unit_price_cents]
      properties:
        line_no:       { type: integer }
        sku:           { type: string }
        qty:           { type: integer, minimum: 1 }
        unit_price_cents: { type: integer, minimum: 0 }

    Order:
      type: object
      required: [id, customer_id, status, total_cents, currency, items, created_at, updated_at]
      properties:
        id:            { type: string, format: uuid }
        customer_id:   { type: string, format: uuid }
        status:
          type: string
          enum: [pending, confirmed, shipped, cancelled]
        total_cents:   { type: integer }
        currency:      { type: string, minLength: 3, maxLength: 3 }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    CreateOrderRequest:
      type: object
      required: [customer_id, items, currency]
      properties:
        customer_id:   { type: string, format: uuid }
        currency:      { type: string, minLength: 3, maxLength: 3 }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, qty, unit_price_cents]
            properties:
              sku:              { type: string }
              qty:              { type: integer, minimum: 1 }
              unit_price_cents: { type: integer, minimum: 0 }

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, shipped, cancelled]
        reason: { type: string }

    Problem:
      type: object
      properties:
        type:     { type: string }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: liveness
      responses:
        "200":
          description: Service is alive

  /readyz:
    get:
      summary: Readiness probe
      operationId: readiness
      responses:
        "200":
          description: DB and Redis reachable
        "503":
          description: One or more dependencies unreachable

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain: {}

  /info:
    get:
      summary: Service info
      operationId: info
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:    { type: string }
                  version:    { type: string }
                  commit:     { type: string }
                  build_time: { type: string }
                  framework:  { type: string }

  /v1/orders:
    post:
      summary: Create an order
      operationId: createOrder
      security:
        - ApiKeyAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        "201":
          description: Order created
          headers:
            Location:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        "400":
          description: Validation error
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "409":
          description: Idempotency conflict
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "503":
          description: DB unavailable
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    get:
      summary: List orders
      operationId: listOrders
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated list of orders
          headers:
            Link:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:     { type: integer }
                  page:      { type: integer }
                  page_size: { type: integer }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }

  /v1/orders/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    get:
      summary: Get order by ID
      operationId: getOrder
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        "400":
          description: Invalid UUID
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "404":
          description: Order not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    patch:
      summary: Update order status
      operationId: updateOrderStatus
      security:
        - ApiKeyAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOrderStatusRequest' }
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        "404":
          description: Order not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "422":
          description: Invalid status transition
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    delete:
      summary: Cancel order (soft delete)
      operationId: cancelOrder
      security:
        - ApiKeyAuth: []
      responses:
        "204":
          description: Order cancelled
        "404":
          description: Order not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /v1/orders/slow:
    get:
      summary: Chaos endpoint — sleeps 2 seconds
      operationId: slowEndpoint
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Slow response after 2000ms delay
