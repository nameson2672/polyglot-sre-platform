grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  ingress:
    enabled: false
  # Dashboard sidecar: import any ConfigMap labeled grafana_dashboard=1 (in the
  # monitoring namespace). folderAnnotation + foldersFromFilesStructure let our
  # ConfigMap's grafana_folder annotation place the dashboard in a "Polyglot" folder.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
  # Loki + Tempo datasources with trace<->log correlation (the Prometheus datasource
  # is provisioned by the chart by default).
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      jsonData:
        # log -> trace: click the traceId in a log line to open the Tempo trace.
        derivedFields:
          - name: traceId
            matcherType: regex
            matcherRegex: '"?trace_?[Ii]d"?[:=]"?(\w+)'
            url: '$${__value.raw}'
            datasourceUid: tempo
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3200
      jsonData:
        # trace -> log: from a span, jump to the matching logs in Loki by trace id.
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: '-5m'
          spanEndTimeShift: '5m'
          filterByTraceID: true
          filterBySpanID: false

prometheus:
  prometheusSpec:
    retention: 15d
    # Accept remote-write from Alloy (app OTLP metrics fan out to here).
    enableRemoteWriteReceiver: true
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          resources:
            requests:
              storage: 20Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Select ALL PrometheusRules (not just release=kube-prometheus-stack), so the
    # PrometheusRules generated by the Pyrra operator from our SLOs are loaded.
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          resources:
            requests:
              storage: 2Gi
    # Mount the Infisical-sourced secret (see platform/observability/secrets/
    # alertmanager-pyrra-external.yaml) at /etc/alertmanager/secrets/<secret-name>/.
    # Referenced below via *_file so no secrets are committed.
    secrets:
      - alertmanager-pyrra-secrets
  # Routing for Pyrra burn-rate alerts (mirrors platform/observability/local/alertmanager.yml):
  #   ErrorBudgetBurn severity=critical -> PagerDuty AND Slack
  #   ErrorBudgetBurn severity=warning  -> Slack only
  #   kind=saturation                   -> Slack only
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-slo
      group_by: ['alertname', 'slo']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - alertname = "ErrorBudgetBurn"
            - severity = "critical"
          receiver: pagerduty-and-slack
        - matchers:
            - alertname = "ErrorBudgetBurn"
            - severity = "warning"
          receiver: slack-slo
        - matchers:
            - kind = "saturation"
          receiver: slack-slo
    receivers:
      - name: slack-slo
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-pyrra-secrets/slack_api_url
            channel: '#slo-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .CommonLabels.alertname }} — {{ .CommonLabels.slo }}'
            text: >-
              *Severity:* {{ .CommonLabels.severity }}
              {{ range .Alerts }}
              *SLO:* {{ .Labels.slo }} | *Window:* {{ .Labels.long }}/{{ .Labels.short }}
              {{ .Annotations.description }}
              {{ end }}
      - name: pagerduty-and-slack
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/alertmanager-pyrra-secrets/pagerduty_routing_key
            send_resolved: true
            severity: critical
            description: '{{ .CommonLabels.alertname }} — {{ .CommonLabels.slo }} (fast burn)'
            details:
              slo: '{{ .CommonLabels.slo }}'
              severity: '{{ .CommonLabels.severity }}'
              num_firing: '{{ .Alerts.Firing | len }}'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-pyrra-secrets/slack_api_url
            channel: '#slo-critical'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🚨 PAGING{{ else }}✅ RESOLVED{{ end }} {{ .CommonLabels.alertname }} — {{ .CommonLabels.slo }}'
            text: >-
              *Fast burn — paged via PagerDuty.* Severity: {{ .CommonLabels.severity }}
              {{ range .Alerts }}
              *SLO:* {{ .Labels.slo }}
              {{ .Annotations.description }}
              {{ end }}

prometheusOperator:
  admissionWebhooks:
    patch:
      enabled: true
