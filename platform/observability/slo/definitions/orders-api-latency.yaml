apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: orders-api-latency
  namespace: monitoring
  labels:
    app.kubernetes.io/name: orders-api
    app.kubernetes.io/part-of: polyglot-sre-platform
    pyrra.dev/team: platform
    # Propagated by Pyrra onto the generated PrometheusRule so the
    # kube-prometheus-stack Prometheus selects it.
    release: kube-prometheus-stack
spec:
  description: 95% of orders-api HTTP requests complete in under 500ms (p95 < 500ms).
  target: "95"
  window: 4w
  indicator:
    latency:
      success:
        metric: http_server_request_duration_seconds_bucket{job="orders-api",le="0.5"}
      total:
        metric: http_server_request_duration_seconds_count{job="orders-api"}
