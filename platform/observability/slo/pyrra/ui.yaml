apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: pyrra
    app.kubernetes.io/version: 0.10.1
  name: pyrra-api
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: pyrra
    app.kubernetes.io/version: 0.10.1
  name: pyrra-api
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/name: pyrra
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: pyrra
        app.kubernetes.io/version: 0.10.1
    spec:
      containers:
      - args:
        - api
        - --api-url=http://pyrra-kubernetes.monitoring.svc.cluster.local:9444
        - --prometheus-url=http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        image: ghcr.io/pyrra-dev/pyrra:v0.10.1
        name: pyrra
        ports:
        - containerPort: 9099
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: pyrra-api
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: pyrra
    app.kubernetes.io/version: 0.10.1
  name: pyrra-api
  namespace: monitoring
spec:
  ports:
  - name: http
    port: 9099
    targetPort: 9099
  selector:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: pyrra
---
