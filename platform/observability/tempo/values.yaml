# Grafana Tempo — single-binary mode, local PVC storage.
# Receives traces from grafana-alloy (otelcol.exporter.otlp -> tempo:4317) and
# serves the query API on :3200 for the Grafana Tempo datasource.
tempo:
  retention: 24h

  # The chart defaults memBallastSizeMbs to 1024 (a 1 GB ballast). With a 512Mi limit
  # that guaranteed an OOMKill (exit 137) the moment a search ran. Drop the ballast and
  # give Tempo enough headroom to serve TraceQL search.
  memBallastSizeMbs: 0

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Only accept OTLP (drop the default jaeger/opencensus listeners we don't use).
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

# Persist traces + WAL on a Hetzner volume (same pattern as Loki/Prometheus).
persistence:
  enabled: true
  storageClassName: hcloud-volumes
  accessModes:
    - ReadWriteOnce
  size: 10Gi

service:
  type: ClusterIP
