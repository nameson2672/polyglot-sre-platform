# Produces Secret `alertmanager-pyrra-secrets` in `monitoring`, mounted into Alertmanager
# (kube-prometheus-stack values: alertmanager.alertmanagerSpec.secrets) and referenced via
# *_file in the Alertmanager routing config.
# Requires in Infisical (env dev, path /): SLACK_SLO_WEBHOOK_URL, PAGERDUTY_ROUTING_KEY
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-pyrra-secrets
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: alertmanager-pyrra-secrets
    creationPolicy: Owner
  data:
    - secretKey: slack_api_url
      remoteRef:
        key: SLACK_SLO_WEBHOOK_URL
    - secretKey: pagerduty_routing_key
      remoteRef:
        key: PAGERDUTY_ROUTING_KEY
