# Produces Secret `loki-s3-credentials` in `monitoring` (AWS creds for Loki S3 backup).
# Requires in Infisical (env dev, path /): LOKI_S3_AWS_ACCESS_KEY_ID, LOKI_S3_AWS_SECRET_ACCESS_KEY
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-s3-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: loki-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: LOKI_S3_AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: LOKI_S3_AWS_SECRET_ACCESS_KEY
