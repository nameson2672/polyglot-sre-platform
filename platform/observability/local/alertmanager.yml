# Local Alertmanager config for validating Pyrra burn-rate alert routing end-to-end.
# Mirrors the in-cluster routing (kube-prometheus-stack values.yaml -> alertmanager.config):
#   - ErrorBudgetBurn + severity=critical  -> PagerDuty AND Slack
#   - ErrorBudgetBurn + severity=warning   -> Slack only
#   - kind=saturation                      -> Slack only
#
# Secrets are read from files mounted at /etc/alertmanager/secrets (gitignored). Copy the
# *.example files in local/secrets/ and fill in a real test Slack webhook to verify delivery.
# Routing (without secrets) can be verified with:
#   amtool config routes test --config.file=platform/observability/local/alertmanager.yml \
#     alertname=ErrorBudgetBurn severity=critical
global:
  resolve_timeout: 5m

route:
  receiver: slack-slo
  group_by: ['alertname', 'slo']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Fast-burn (Google SRE short+long window) -> page + notify.
    - matchers:
        - alertname = "ErrorBudgetBurn"
        - severity = "critical"
      receiver: pagerduty-and-slack
    # Slow-burn -> Slack only.
    - matchers:
        - alertname = "ErrorBudgetBurn"
        - severity = "warning"
      receiver: slack-slo
    # CPU/memory saturation threshold alerts -> Slack only.
    - matchers:
        - kind = "saturation"
      receiver: slack-slo

receivers:
  - name: slack-slo
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_api_url
        channel: '#slo-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .CommonLabels.alertname }} — {{ .CommonLabels.slo }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          *SLO:* {{ .Labels.slo }} | *Window:* {{ .Labels.long }}/{{ .Labels.short }}
          {{ .Annotations.description }}
          {{ end }}

  - name: pagerduty-and-slack
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/secrets/pagerduty_routing_key
        send_resolved: true
        severity: critical
        description: '{{ .CommonLabels.alertname }} — {{ .CommonLabels.slo }} (fast burn)'
        details:
          slo: '{{ .CommonLabels.slo }}'
          severity: '{{ .CommonLabels.severity }}'
          num_firing: '{{ .Alerts.Firing | len }}'
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_api_url
        channel: '#slo-critical'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨 PAGING{{ else }}✅ RESOLVED{{ end }} {{ .CommonLabels.alertname }} — {{ .CommonLabels.slo }}'
        text: >-
          *Fast burn — paged via PagerDuty.* Severity: {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          *SLO:* {{ .Labels.slo }}
          {{ .Annotations.description }}
          {{ end }}
