---
# Local-only override for the bundled Prometheus inside grafana/otel-lgtm.
# Mounted over /otel-lgtm/prometheus.yaml via docker-compose.monitoring.yml.
#
# The image's default config only ingests OTLP (no scraping), so the prom-client
# /metrics endpoints exposed by checkout-bff and notifier-worker never reach
# Prometheus. The scrape_configs below pull them in. orders-api is intentionally
# omitted — it has no /metrics endpoint and already exports metrics via OTLP.
#
# The otlp/global/storage blocks are copied verbatim from the image default so
# OTLP-delivered metrics (orders-api, auto-instrumentation) keep working.
global:
  scrape_native_histograms: true
otlp:
  keep_identifying_resource_attributes: true
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment # backward compatibility
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database # used by otelcol/receiver/mongodb
    - kafka.cluster.alias
storage:
  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m

# Local analogue of a k8s ServiceMonitor/PodMonitor: scrape the apps' /metrics.
# Targets use the running container names, resolvable on the shared polyglot-dev
# network. service_name is attached as a static label so scraped series filter
# the same way as OTLP series (service_name="…") for consistent dashboards.
scrape_configs:
  - job_name: checkout-bff
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["polyglot-checkout-bff:8081"]
        labels:
          service_name: checkout-bff
  - job_name: notifier-worker
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["polyglot-notifier-worker:8082"]
        labels:
          service_name: notifier-worker
