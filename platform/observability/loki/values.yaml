loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: loki-for-polyglot
      ruler: loki-for-polyglot
    s3:
      endpoint: https://fsn1.your-objectstorage.com
      region: fsn1
      s3ForcePathStyle: true
      insecure: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  auth_enabled: false

# The S3 (Hetzner object storage) credentials must be injected into EVERY Loki
# component (read/write/backend). In the grafana/loki chart that is done via
# `global.extraEnvFrom` — a top-level `extraEnvFrom:` key is silently ignored, which
# left Loki with no credentials (it fell back to EC2 IMDS and could not flush chunks).
global:
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials

write:
  replicas: 1
  persistence:
    storageClass: hcloud-volumes
    size: 10Gi

read:
  replicas: 1

backend:
  replicas: 1
  persistence:
    storageClass: hcloud-volumes
    size: 10Gi

gateway:
  enabled: true

singleBinary:
  replicas: 0

minio:
  enabled: false

chunksCache:
  enabled: true
  allocatedMemory: 128
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
