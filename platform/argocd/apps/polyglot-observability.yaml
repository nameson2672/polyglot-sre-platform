apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polyglot-observability
  namespace: argocd
  annotations:
    # After kube-prometheus-stack (wave 1, provides Grafana + ServiceMonitor CRD)
    # and the app workloads (wave 6, provide the Services the ServiceMonitors target).
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nameson2672/polyglot-sre-platform
    targetRevision: main
    # Plain manifests (dashboard ConfigMap + ServiceMonitors). Kept in its own k8s/
    # subdir so the local-only provider.yaml and json/ are not synced.
    path: platform/observability/dashboards/k8s
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
