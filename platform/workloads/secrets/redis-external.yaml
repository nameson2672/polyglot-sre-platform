# Produces Secret `redis-auth` in `dev`. Data key `redis-password` matches the
# Bitnami Redis chart's existingSecret convention.
# Requires in Infisical (env dev, path /): REDIS_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth
  namespace: dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: redis-auth
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: REDIS_PASSWORD
