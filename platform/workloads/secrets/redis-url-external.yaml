# Produces Secret `redis-url` in `dev` (consumed via
# checkout-bff/values-dev.yaml -> secrets.redisSecret).
# Requires in Infisical (env dev, path /): REDIS_URL
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-url
  namespace: dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: redis-url
    creationPolicy: Owner
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: REDIS_URL
