# Produces Secret `orders-api-secrets` in `dev`.
# Requires in Infisical (env dev, path /):
#   ORDERS_API_ORDERS_API_KEY, ORDERS_API_POSTGRES_CONNECTION_STRING
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orders-api-secrets
  namespace: dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: orders-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: ORDERS_API_KEY
      remoteRef:
        key: ORDERS_API_ORDERS_API_KEY
    - secretKey: POSTGRES_CONNECTION_STRING
      remoteRef:
        key: ORDERS_API_POSTGRES_CONNECTION_STRING
