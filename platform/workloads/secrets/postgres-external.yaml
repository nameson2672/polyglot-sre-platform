# Produces Secret `postgres-bootstrap-credentials` (type Opaque) in `dev`.
# Replaces both the old postgres-sealed.yaml AND the plaintext dev-secret-plain.yaml.
# Requires in Infisical (env dev, path /): POSTGRES_USERNAME, POSTGRES_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-bootstrap-credentials
  namespace: dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: postgres-bootstrap-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: username
      remoteRef:
        key: POSTGRES_USERNAME
    - secretKey: password
      remoteRef:
        key: POSTGRES_PASSWORD
