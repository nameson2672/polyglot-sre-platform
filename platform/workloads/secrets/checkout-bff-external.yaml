# Produces Secret `checkout-bff-secrets` in `dev` (consumed via
# checkout-bff/values-dev.yaml -> secrets.existingSecret).
# Requires these keys in Infisical (project polyglot-sre-platform, env dev, path /):
#   CHECKOUT_BFF_JWT_SECRET, CHECKOUT_BFF_ORDERS_API_KEY, CHECKOUT_BFF_ORDERS_API_URL
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: checkout-bff-secrets
  namespace: dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: checkout-bff-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: CHECKOUT_BFF_JWT_SECRET
    - secretKey: ORDERS_API_KEY
      remoteRef:
        key: CHECKOUT_BFF_ORDERS_API_KEY
    - secretKey: ORDERS_API_URL
      remoteRef:
        key: CHECKOUT_BFF_ORDERS_API_URL
