# Produces Secret `notifier-worker-secrets` in `dev`.
# Requires in Infisical (env dev, path /):
#   NOTIFIER_WORKER_WEBHOOK_AUTH_TOKEN, NOTIFIER_WORKER_WEBHOOK_URL
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notifier-worker-secrets
  namespace: dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: notifier-worker-secrets
    creationPolicy: Owner
  data:
    - secretKey: WEBHOOK_AUTH_TOKEN
      remoteRef:
        key: NOTIFIER_WORKER_WEBHOOK_AUTH_TOKEN
    - secretKey: WEBHOOK_URL
      remoteRef:
        key: NOTIFIER_WORKER_WEBHOOK_URL
