# Cluster-scoped store: tells External Secrets Operator how to reach Infisical.
# Auth uses the `infisical-machine-identity` Secret created per-cluster by
# scripts/cluster-up.sh (Universal Auth client id/secret of a READ-ONLY,
# dev-scoped Machine Identity). That Secret is the ONLY bootstrap credential a
# fresh cluster needs — it is never committed to git.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  provider:
    infisical:
      hostAPI: https://app.infisical.com/api
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-machine-identity
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-machine-identity
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        # Adjust projectSlug to match your Infisical project slug.
        projectSlug: polyglot-sre-platform-qgx6
        environmentSlug: dev
        secretsPath: "/"
        recursive: false
