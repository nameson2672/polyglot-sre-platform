replicaCount: 1

image:
  repository: ghcr.io/nameson2672/notifier-worker
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8082

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

secrets:
  existingSecret: ""

env: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: 8082
  initialDelaySeconds: 15
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8082
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
