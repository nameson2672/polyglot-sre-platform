image:
  tag: "bad-v2"
  pullPolicy: IfNotPresent
ingress:
  enabled: true
  className: nginx
  # nip.io wildcard DNS → resolves to the Hetzner ingress-nginx LB IP. Replace
  # <LB_IP> with the load balancer address (kubectl -n ingress-nginx get svc).
  host: checkout-bff.49.12.16.149.nip.io
secrets:
  existingSecret: "checkout-bff-secrets"
  redisSecret: "redis-url"
env:
  CHECKOUT_BFF_PORT: "8081"
  NODE_ENV: development
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://grafana-alloy.monitoring.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_SERVICE_NAME: "checkout-bff"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev"
