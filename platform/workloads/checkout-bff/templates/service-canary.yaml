apiVersion: v1
kind: Service
metadata:
  name: {{ include "checkout-bff.fullname" . }}-canary
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "checkout-bff.labels" . | nindent 4 }}
spec:
  # Argo Rollouts injects the canary ReplicaSet's pod-template-hash into this
  # Service's selector during a rollout, so it targets only canary pods.
  type: {{ .Values.service.type }}
  selector:
    {{- include "checkout-bff.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
