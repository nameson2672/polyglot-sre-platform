apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "checkout-bff.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "checkout-bff.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "checkout-bff.selectorLabels" . | nindent 6 }}
  strategy:
    canary:
      # Stable/canary Services are swapped between the two ReplicaSets; the nginx
      # traffic router shifts weight by patching a cloned "-canary" Ingress.
      stableService: {{ include "checkout-bff.fullname" . }}
      canaryService: {{ include "checkout-bff.fullname" . }}-canary
      trafficRouting:
        nginx:
          stableIngress: {{ include "checkout-bff.fullname" . }}
      steps:
        - setWeight: 10
        - pause: {duration: {{ .Values.rollout.pauseDuration }}}
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: p95-latency
            args:
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 25
        - pause: {duration: {{ .Values.rollout.pauseDuration }}}
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: p95-latency
            args:
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 50
        - pause: {duration: {{ .Values.rollout.pauseDuration }}}
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: p95-latency
            args:
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 100
  template:
    metadata:
      labels:
        {{- include "checkout-bff.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "checkout-bff.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: checkout-bff
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            {{- if .Values.secrets.existingSecret }}
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
            {{- end }}
            {{- if .Values.secrets.redisSecret }}
            - secretRef:
                name: {{ .Values.secrets.redisSecret }}
            {{- end }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
