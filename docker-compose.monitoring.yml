services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: polyglot-otel-lgtm
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9090:9090"   # Prometheus query
    volumes:
      - otel_lgtm_data:/data
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    networks:
      - polyglot-dev

networks:
  polyglot-dev:
    external: true
    name: polyglot-dev

volumes:
  otel_lgtm_data:
