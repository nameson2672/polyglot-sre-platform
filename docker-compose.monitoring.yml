services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: polyglot-otel-lgtm
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9090:9090"   # Prometheus query
    volumes:
      - otel_lgtm_data:/data
      # Scrape app /metrics into the bundled Prometheus (custom prom-client metrics)
      - ./platform/observability/local/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      # Auto-provision dashboards from repo JSON into the "Polyglot" folder
      - ./platform/observability/dashboards/provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/polyglot.yaml:ro
      - ./platform/observability/dashboards/json:/var/lib/grafana/dashboards/polyglot:ro
      # Pyrra-generated recording + burn-rate alerting rules (written by the pyrra service).
      # Read via rule_files in prometheus.yaml. Prometheus loads rule files at startup, so after
      # pyrra (re)generates them run: docker compose -f docker-compose.monitoring.yml restart otel-lgtm
      - ./platform/observability/local/pyrra-rules:/etc/prometheus/pyrra:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    networks:
      - polyglot-dev

  # Local analogue of the in-cluster `pyrra kubernetes` operator. Filesystem mode reads the
  # same ServiceLevelObjective manifests and renders vanilla Prometheus recording + multi-window
  # burn-rate alerting rules into ./platform/observability/local/pyrra-rules.
  pyrra:
    image: ghcr.io/pyrra-dev/pyrra:v0.10.1
    container_name: polyglot-pyrra
    command:
      - filesystem
      - --config-files=/etc/pyrra/slos/*.yaml
      - --prometheus-url=http://otel-lgtm:9090
      - --prometheus-folder=/etc/pyrra/rules
      - --generic-rules
    ports:
      - "9444:9444"   # Pyrra filesystem backend API (the web UI is the separate in-cluster pyrra-api component)
    volumes:
      - ./platform/observability/slo/definitions:/etc/pyrra/slos:ro
      # Host bind mount (not a named volume): on Docker Desktop it stays writable for the
      # distroless non-root user, and otel-lgtm reads the same files back read-only.
      - ./platform/observability/local/pyrra-rules:/etc/pyrra/rules
    networks:
      - polyglot-dev

  # Local Alertmanager so the full burn-rate -> routing -> Slack/PagerDuty path is testable.
  # Slack webhook + PagerDuty routing key are read from gitignored files under local/secrets/
  # (copy the *.example files and fill in real/test values). Routing correctness can be checked
  # without real secrets via: amtool config routes test --config.file=local/alertmanager.yml ...
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: polyglot-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./platform/observability/local/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./platform/observability/local/secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    networks:
      - polyglot-dev

networks:
  polyglot-dev:
    external: true
    name: polyglot-dev

volumes:
  otel_lgtm_data:
  alertmanager_data:
