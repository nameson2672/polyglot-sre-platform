cluster_name: "hetzner-k3s-cluster"
kubeconfig_path: "./kubeconfig"
k3s_version: v1.32.0+k3s1

networking:
  ssh:
    port: 22
    use_agent: false
    public_key_path: "~/.ssh/id_ed25519.pub"
    private_key_path: "~/.ssh/id_ed25519"
  allowed_networks:
    ssh:
      - 0.0.0.0/0
    api:
      - 0.0.0.0/0
  public_network:
    ipv4: true
    ipv6: true
  private_network:
    enabled: true
    subnet: 10.0.0.0/16
  cni:
    enabled: true
    encryption: false
    mode: flannel

masters_pool:
  instance_type: cx23         # 2 vCPU, 8 GB RAM
  instance_count: 1           # single master (not HA)
  location: fsn1

schedule_workloads_on_masters: false

worker_node_pools:
  - name: workers
    instance_type: cx23       # 2 vCPU, 8 GB RAM
    instance_count: 1
    location: fsn1

datastore:
  mode: etcd
